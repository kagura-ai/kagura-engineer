name: Publish to PyPI

# Mirrors kagura-memory-python-sdk's publish flow: tag push -> PyPI + GitHub
# Release; manual workflow_dispatch -> TestPyPI. Authentication is OIDC Trusted
# Publishing (no tokens) — register this workflow as a trusted publisher on
# pypi.org and test.pypi.org, and create the `pypi` / `testpypi` GitHub
# environments.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        # Idempotent + race-safe: a manual /release may also create the release.
        # Re-check after a failed create and treat "already exists" as success —
        # this job only needs to GUARANTEE a release exists.
        run: |
          if gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF already exists, skipping."
          elif gh release create "$REF" --generate-notes; then
            echo "Created release $REF."
          elif gh release view "$REF" >/dev/null 2>&1; then
            echo "Release $REF was created concurrently; treating as success."
          else
            echo "Failed to create release $REF." >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
